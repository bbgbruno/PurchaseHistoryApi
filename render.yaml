services:
  - type: web
    name: purchasehistory-api
    runtime: image
    repo: https://github.com/seu-repo/PurchaseHistoryApi
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: 5299
      - key: ConnectionStrings__DefaultConnection
        sync: false
